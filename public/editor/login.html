<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen — CMS | GoWebbo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #0f172a;
    }
    .card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 40px 36px; width: 100%; max-width: 380px;
    }
    .logo { font-size: 22px; font-weight: 800; color: #2563eb; margin-bottom: 6px; }
    .logo span { color: #64748b; font-weight: 500; }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: #0f172a; }
    label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .05em; color: #64748b; margin-bottom: 5px; }
    input[type="password"] {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 15px; font-family: inherit; color: #0f172a;
      transition: border-color .15s;
    }
    input[type="password"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    button {
      margin-top: 16px; width: 100%; padding: 11px;
      background: #2563eb; color: #fff; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .error { margin-top: 12px; font-size: 13px; color: #ef4444; display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">go<span>webbo</span></div>
  <h1>CMS inloggen</h1>
  <div class="field">
    <label for="pw">Wachtwoord</label>
    <input type="password" id="pw" autofocus onkeydown="if(event.key==='Enter') login()">
  </div>
  <button id="btn" onclick="login()">Inloggen →</button>
  <div class="error" id="err">Ongeldig wachtwoord. Probeer opnieuw.</div>
</div>
<script>
  // Als al ingelogd, direct door
  if (sessionStorage.getItem('editor_token')) location.replace('/editor/');

  async function login() {
    const pw  = document.getElementById('pw').value;
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    if (!pw) return;

    btn.disabled = true;
    btn.textContent = 'Bezig…';
    err.style.display = 'none';

    try {
      const res  = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      const data = await res.json();
      if (res.ok && data.token) {
        sessionStorage.setItem('editor_token', data.token);
        location.replace('/editor/');
      } else {
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Inloggen →';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    } catch {
      err.textContent = 'Verbindingsfout. Probeer opnieuw.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Inloggen →';
    }
  }
</script>
</body>
</html>
