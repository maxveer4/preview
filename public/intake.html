    :root {

    .landing-theme h1,.landing-theme h2,.landing-theme h3,
    .landing-theme h4,.landing-theme h5,.landing-theme h6 {

    /* Toast */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
      display: flex; flex-direction: column; gap: 0.5rem;
      pointer-events: none;
    }
    .toast-item {
      background: hsl(var(--foreground)); color: hsl(var(--background));
      padding: 0.75rem 1.25rem; border-radius: 0.5rem;
      font-size: 0.875rem; max-width: 20rem;
      animation: slideIn 0.3s ease; pointer-events: all;
    }
    .toast-item.error { background: hsl(var(--destructive)); color: hsl(var(--destructive-foreground)); }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Photo slot aspect ratios */
    .aspect-16-9 { aspect-ratio: 16/9; }
    .aspect-square-slot { aspect-ratio: 1/1; }

    /* Dropdown */
    .dropdown-menu {
      position: absolute; top: calc(100% + 0.5rem); left: 50%;
      transform: translateX(-50%);
      background: hsl(var(--card)); border: 1px solid hsl(var(--border));
      border-radius: 0.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      width: 16rem; z-index: 50; overflow: hidden;
      max-height: 18rem; overflow-y: auto;
    }
    .dropdown-menu button {
      display: block; width: 100%; text-align: left;
      padding: 0.625rem 1rem; font-size: 0.875rem;
      color: hsl(var(--foreground)); background: transparent;
      border: none; cursor: pointer; transition: background 0.15s;
    }
    .dropdown-menu button:hover { background: hsl(var(--accent)); }

    input[type="file"] { display: none; }

    /* Progress bar animation */
    .progress-fill { transition: width 0.5s ease-out; }

    /* Card hover */
    .beroep-card { transition: all 0.2s; cursor: pointer; }
    .beroep-card:hover { border-color: hsl(var(--primary)); background: hsl(var(--accent)); }
    .beroep-card:hover svg { color: hsl(var(--primary)); }

    /* Service checkbox card */
    .dienst-card { transition: all 0.2s; cursor: pointer; }

    /* Button base */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.5rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500;
      padding: 0.5rem 1rem; border: 1px solid transparent; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }
    .btn-primary:hover:not(:disabled) { filter: brightness(0.92); }
    .btn-outline {
      background: transparent; color: hsl(var(--foreground));
      border-color: hsl(var(--border));
    }
    .btn-outline:hover:not(:disabled) { background: hsl(var(--accent)); }
    .btn-sm { padding: 0.25rem 0.75rem; font-size: 0.8125rem; }
    .btn-ghost { background: transparent; color: hsl(var(--foreground)); }
    .btn-ghost:hover:not(:disabled) { background: hsl(var(--accent)); }

    /* Input */
    .input {
      width: 100%; border: 1px solid hsl(var(--input)); border-radius: 0.375rem;
      padding: 0.5rem 0.75rem; font-size: 0.875rem; height: 2.5rem;
      background: hsl(var(--card)); color: hsl(var(--foreground));
      font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    .input:focus { border-color: hsl(var(--ring)); box-shadow: 0 0 0 2px hsl(var(--ring) / 0.2); }
    .input.error { border-color: hsl(var(--destructive)); }

    label.form-label {
      display: block; font-size: 0.875rem; font-weight: 500;
      color: hsl(var(--foreground)); margin-bottom: 0.25rem;
    }
    .error-msg { color: hsl(var(--destructive)); font-size: 0.75rem; margin-top: 0.25rem; }

// ─── FORM SHELL (Steps 2-6) ───────────────────────────────────────────────────
function renderForm() {
  const stepLabels = ["Beroep","Diensten","Contact","Kleur","Foto's","Bevestiging"];
  const pct = (state.step / 6) * 100;

  let content = "";
  if (state.step === 2) content = renderStepDiensten();
  else if (state.step === 3) content = renderStepContact();
  else if (state.step === 4) content = renderStepKleur();
  else if (state.step === 5) content = renderStepFotos();
  else if (state.step === 6) content = renderStepBevestiging();

  return `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(to bottom,white,hsl(var(--accent)));padding:1rem;">
    <div style="width:100%;max-width:42rem;">
      <div style="text-align:center;margin-bottom:2rem;">
        <h1 style="font-size:clamp(1.5rem,4vw,2.25rem);font-weight:700;font-family:'Poppins',sans-serif;color:hsl(var(--foreground));">Website Intake</h1>
        <p style="color:hsl(var(--muted-foreground));margin-top:0.25rem;">In 6 stappen naar jouw professionele website</p>
      </div>
      <div style="background:hsl(var(--card));border-radius:0.75rem;border:1px solid hsl(var(--border));box-shadow:0 2px 12px rgba(0,0,0,0.07);padding:1.5rem 2rem;">
        <!-- Progress Bar -->
        <div style="margin-bottom:2rem;">
          <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;">
            ${stepLabels.map((l,i) => `
              <span style="font-size:0.75rem;font-weight:500;font-family:'Poppins',sans-serif;color:${i+1<=state.step?'hsl(var(--primary))':'hsl(var(--muted-foreground))'};transition:color 0.3s;">
                <span class="hidden-mobile">${l}</span>
                <span class="show-mobile">${i+1}</span>
              </span>
            `).join("")}
          </div>
          <div style="width:100%;height:8px;border-radius:9999px;background:hsl(var(--muted));overflow:hidden;">
            <div class="progress-fill" style="height:100%;border-radius:9999px;background:hsl(var(--primary));width:${pct}%;"></div>
          </div>
        </div>
        ${content}

    @media(max-width:480px){ .hidden-mobile{display:none;} .show-mobile{display:inline;} }
    @media(min-width:481px){ .hidden-mobile{display:inline;} .show-mobile{display:none;} }
  </style>`;
}

    <p style="color:hsl(var(--muted-foreground));margin-bottom:1.5rem;">Upload foto's voor je website (optioneel).</p>
    <div style="display:flex;flex-direction:column;gap:1.5rem;margin-bottom:2rem;">
      ${FOTO_SLOTS.map(slot => renderPhotoSlot(slot, dis)).join("")}
    </div>
    <div style="display:flex;justify-content:space-between;">
      <button class="btn btn-outline" onclick="goStep(4)" ${dis?'disabled':''}>Terug</button>
      <button class="btn btn-primary" id="btn-fotos-next" onclick="handleFotosNext()" ${dis?'disabled':''}>
        ${dis?'Uploaden...':'Volgende'}
      </button>
    </div>
  </div>`;
}

function renderPhotoSlot(slot, disabled) {
  const file = fileObjects[slot.key];
  const preview = previewUrls[slot.key];
  const skipped = state.skipped[slot.key];
  return `
  <div>
    <p style="font-size:0.875rem;font-weight:500;color:hsl(var(--foreground));margin-bottom:0.25rem;">${slot.label}</p>
    <p style="font-size:0.75rem;color:hsl(var(--muted-foreground));margin-bottom:0.5rem;">${slot.hint}</p>
    <div class="${slot.aspect}" onclick="${!file&&!disabled?`document.getElementById('file-${slot.key}').click()`:''}"
      style="position:relative;width:100%;border-radius:0.5rem;overflow:hidden;border:2px ${file?'solid hsl(var(--primary))':'dashed hsl(var(--border))'};background:${file?'transparent':'hsl(var(--muted))'};${!file&&!disabled?'cursor:pointer;':''};display:flex;align-items:center;justify-content:center;">
      ${preview
        ? `<img src="${preview}" alt="${slot.label}" style="width:100%;height:100%;object-fit:cover;display:block;">`
        : `<div style="display:flex;flex-direction:column;align-items:center;gap:0.25rem;padding:1rem;">
             <span style="color:hsl(var(--muted-foreground));">${icons.upload}</span>
             <span style="font-size:0.75rem;color:hsl(var(--muted-foreground));">Klik om te uploaden</span>
           </div>`
      }
      ${file ? `
        <button type="button" onclick="removePhoto('${slot.key}',event)" ${disabled?'disabled':''}
          style="position:absolute;top:0.5rem;right:0.5rem;background:rgba(255,255,255,0.85);border-radius:9999px;padding:0.25rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;"
          onmouseover="this.style.background='hsl(0,84%,60%)';this.style.color='white';"
          onmouseout="this.style.background='rgba(255,255,255,0.85)';this.style.color='inherit';">
          ${icons.x}
        </button>` : ''}
    </div>
    <div style="margin-top:0.5rem;display:flex;gap:0.75rem;align-items:center;">
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('file-${slot.key}').click()" ${disabled?'disabled':''}>
        ${file?'Vervangen':'Uploaden'}
      </button>
      <button class="btn btn-sm ${skipped?'btn-primary':'btn-outline'}" onclick="toggleSkip('${slot.key}')" ${disabled?'disabled':''}>
        Overslaan
      </button>
    </div>
    <input type="file" id="file-${slot.key}" accept="image/*" onchange="handleFileChange('${slot.key}',this)">
  </div>`;
}

// ─── STEP 6: BEVESTIGING ─────────────────────────────────────────────────────
function renderStepBevestiging() {
  const kleurLabel = {blauw:"Blauw",groen:"Groen",geel:"Geel",rood:"Rood"}[state.kleur_thema]||state.kleur_thema;
  const diensten = dienstenPerBeroep[state.beroep]||[];
  const uploadedFotos = FOTO_SLOTS.filter(s => fileObjects[s.key]);

  return `
  <div>
    <h2 style="font-size:1.5rem;font-weight:600;font-family:'Poppins',sans-serif;color:hsl(var(--foreground));margin-bottom:0.25rem;">Bevestiging</h2>
    <p style="color:hsl(var(--muted-foreground));margin-bottom:1.5rem;">Controleer je gegevens voordat je verstuurt.</p>
    <div style="display:flex;flex-direction:column;gap:1rem;margin-bottom:2rem;">
      ${section("Beroep", `<p style="color:hsl(var(--foreground));">${beroepLabels[state.beroep]||'-'}</p>`)}
      ${section("Diensten", `
        <div style="display:flex;flex-wrap:wrap;gap:0.5rem;">
          ${state.diensten.map(v => {
            const lbl = diensten.find(d=>d.value===v)?.label||v;
            return `<span style="padding:0.25rem 0.75rem;border-radius:9999px;font-size:0.75rem;font-weight:500;background:hsl(var(--accent));color:hsl(var(--accent-foreground));">${lbl}</span>`;
          }).join("")}
        </div>
      `)}
      ${section("Contactgegevens", `
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.5rem;font-size:0.875rem;">
          ${infoRow("Bedrijfsnaam", state.bedrijfsnaam)}
          ${infoRow("Contactpersoon", state.naam_contactpersoon)}
          ${infoRow("Stad/regio", state.stad)}
          ${infoRow("Telefoon", state.telefoon)}
          ${infoRow("E-mail", state.email)}
        </div>
      `)}
      ${section("Kleur thema", `<p style="color:hsl(var(--foreground));">${kleurLabel}</p>`)}
      ${uploadedFotos.length>0 ? section("Foto's", `
        <ul style="list-style:none;display:flex;flex-direction:column;gap:0.25rem;font-size:0.875rem;">
          ${uploadedFotos.map(s => `
            <li style="color:hsl(var(--foreground));">
              <span style="color:hsl(var(--primary));font-weight:500;">${s.label}:</span> ${escHtml(fileObjects[s.key].name)}
            </li>
          `).join("")}
        </ul>
      `) : ''}
    </div>
    <div style="display:flex;justify-content:space-between;">
      <button class="btn btn-outline" onclick="goStep(5)" ${state.isSubmitting?'disabled':''}>Terug</button>
      <button class="btn btn-primary" onclick="handleSubmit()" ${state.isSubmitting?'disabled':''}>
        ${state.isSubmitting?'Versturen...':'Versturen'}
      </button>
    </div>
  </div>`;
}

function section(title, content) {
  return `
  <div style="padding:1rem;border-radius:0.5rem;background:hsl(var(--card));border:1px solid hsl(var(--border));">
    <h3 style="font-size:0.75rem;font-weight:600;font-family:'Poppins',sans-serif;color:hsl(var(--muted-foreground));text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;">${title}</h3>
    ${content}
  </div>`;
}

function infoRow(label, value) {
  return `<div><span style="color:hsl(var(--muted-foreground));">${label}: </span><span style="font-weight:500;color:hsl(var(--foreground));">${escHtml(value)}</span></div>`;
}

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── EVENT HANDLERS ───────────────────────────────────────────────────────────
function attachEvents() {
  // Beroep card clicks (landing)
  document.querySelectorAll("[data-beroep]").forEach(el => {
    el.addEventListener("click", () => {
      const b = el.dataset.beroep;
      state.beroep = b;
      state.diensten = [];
      state.dropdownOpen = false;
      state.step = 2;
      render();
    });
  });
}

function toggleDropdown() {
  state.dropdownOpen = !state.dropdownOpen;
  const menu = document.getElementById("dropdown-menu");
  if (menu) menu.style.display = state.dropdownOpen ? "block" : "none";
}

// Close dropdown on outside click
document.addEventListener("click", e => {
  if (state.step === 1 && state.dropdownOpen) {
    const trigger = document.getElementById("dropdown-trigger");
    const menu = document.getElementById("dropdown-menu");
    if (trigger && menu && !trigger.contains(e.target) && !menu.contains(e.target)) {
      state.dropdownOpen = false;
      menu.style.display = "none";
    }
  }
});

function goStep(n) {
  state.step = n;
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function toggleDienst(value) {
  if (state.diensten.includes(value)) {
    state.diensten = state.diensten.filter(d => d !== value);
  } else {
    state.diensten = [...state.diensten, value];
  }
  render();
}

function updateField(key, value) {
  state[key] = value;
  if (state.errors[key]) {
    delete state.errors[key];
    // Update just the error message without full re-render
    const errEl = document.querySelector(`#field-${key} + .error-msg`);
    if (errEl) errEl.remove();
    const inp = document.getElementById(`field-${key}`);
    if (inp) inp.classList.remove("error");
  }
}

function validateAndGoContact() {
  const errors = {};
  const d = state;
  if (!d.bedrijfsnaam.trim()) errors.bedrijfsnaam = "Bedrijfsnaam is verplicht";
  if (!d.naam_contactpersoon.trim()) errors.naam_contactpersoon = "Naam contactpersoon is verplicht";
  else if (d.naam_contactpersoon.trim().length < 2) errors.naam_contactpersoon = "Naam moet minimaal 2 tekens zijn";
  if (!d.stad.trim()) errors.stad = "Stad/regio is verplicht";
  if (!d.telefoon.trim()) errors.telefoon = "Telefoonnummer is verplicht";
  else if (!/^[0-9+\-\s()]{7,15}$/.test(d.telefoon.trim())) errors.telefoon = "Ongeldig telefoonnummer";
  if (!d.email.trim()) errors.email = "E-mailadres is verplicht";
  else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d.email.trim())) errors.email = "Ongeldig e-mailadres";

  state.errors = errors;
  if (Object.keys(errors).length === 0) {
    goStep(4);
  } else {
    render();
  }
}

function selectKleur(id) {
  state.kleur_thema = id;
  render();
}

function handleFileChange(key, input) {
  const file = input.files[0];
  if (!file) return;

  // Revoke old preview
  if (previewUrls[key]) URL.revokeObjectURL(previewUrls[key]);

  fileObjects[key] = file;
  previewUrls[key] = URL.createObjectURL(file);
  state.skipped[key] = false;
  input.value = "";
  render();
}

function removePhoto(key, event) {
  event.stopPropagation();
  if (previewUrls[key]) { URL.revokeObjectURL(previewUrls[key]); previewUrls[key] = null; }
  fileObjects[key] = null;
  state.skipped[key] = false;
  render();
}

function toggleSkip(key) {
  state.skipped[key] = !state.skipped[key];
  if (state.skipped[key]) {
    if (previewUrls[key]) { URL.revokeObjectURL(previewUrls[key]); previewUrls[key] = null; }
    fileObjects[key] = null;
  }
  render();
}

async function handleFotosNext() {
  const hasAny = fileObjects.foto_logo || fileObjects.foto_hero || fileObjects.foto_sectie2;
  if (hasAny) {
    state.isUploading = true;
    render();
    try {
      const urls = await uploadFotos();
      state.foto_logo_url = urls.foto_logo || "";
      state.foto_hero_url = urls.foto_hero || "";
      state.foto_sectie2_url = urls.foto_sectie2 || "";
      goStep(6);
    } catch(err) {
      showToast("Upload fout: " + err.message, "error");
    } finally {
      state.isUploading = false;
      render();
    }
  } else {
    goStep(6);
  }
}

async function uploadFotos() {
  const safeName = sanitize(state.bedrijfsnaam || "bedrijf");
  const result = {};
  const slots = ["foto_logo","foto_hero","foto_sectie2"];
  for (const key of slots) {
    const file = fileObjects[key];
    if (!file) { result[key] = ""; continue; }
    const safeFile = sanitize(file.name);
    const path = `${safeName}/${key}_${safeFile}`;
    const resp = await fetch(`${SUPABASE_URL}/storage/v1/object/foto%27s/${path}`, {
      method: "POST",
      headers: {
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": file.type,
        "x-upsert": "false",
      },
      body: file,
    });
    if (!resp.ok) {
      let detail;
      try { const j = await resp.json(); detail = j.message || j.error || JSON.stringify(j); }
      catch { detail = await resp.text().catch(() => "(no body)"); }
      throw new Error(`HTTP ${resp.status}: ${detail}`);
    }
    result[key] = `${SUPABASE_URL}/storage/v1/object/public/foto%27s/${path}`;
  }
  return result;
}

async function handleSubmit() {
  state.isSubmitting = true;
  render();
  try {
    const payload = {
      bedrijfsnaam: state.bedrijfsnaam,
      naam_contactpersoon: state.naam_contactpersoon,
      sector: (state.beroep||"").toLowerCase(),
      Diensten: state.diensten.join(", "),
      stad: state.stad,
      telefoon: state.telefoon,
      email: state.email,
      kleur_thema: state.kleur_thema,
      foto_logo: state.foto_logo_url,
      foto_hero: state.foto_hero_url,
      foto_sectie2: state.foto_sectie2_url,
    };
    const body = JSON.stringify(payload);
    let ok = false;
    try {
      const resp = await fetch(WEBHOOK_URL, {method:"POST",headers:{"Content-Type":"application/json"},body});
      ok = resp.ok;
    } catch {}
    if (!ok) {
      const sent = navigator.sendBeacon(WEBHOOK_URL, new Blob([body],{type:"application/json"}));
      if (!sent) throw new Error("Webhook request mislukt");
    }
    const site = sanitize(state.bedrijfsnaam || "jouw-website");
    window.location.href = `https://preview.gowebbo.io/loading.html?site=${site}`;
  } catch(err) {
    console.error(err);
    showToast("Er ging iets mis. Probeer het opnieuw.", "error");
    state.isSubmitting = false;
    render();
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
